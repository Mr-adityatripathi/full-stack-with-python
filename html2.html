<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Course Sign Up Page</title>
</head>
<body>
  <form>
    <h1>Course Sign Up Page</h1>
    <p>Please note: first name, last name, password, and email are required.</p>

    <label for="firstName">First name:</label><br>
    <input id="firstName" type="text" name="firstName" placeholder="First Name" required><br><br>

    <label for="lastName">Last name:</label><br>
    <input id="lastName" type="text" name="lastName" placeholder="Last name" required><br><br>

    <label for="email">Email:</label><br>
    <input id="email" type="email" name="email" placeholder="name@email.com" required><br><br>

    <label for="password">Password:</label><br>
    <input id="password" type="password" name="password" required><br><br>

    <h4>Are you over the age of 18?</h4>
    <label for="ageYes">
      <input type="radio" id="ageYes" name="ageGroup" value="yes"> Yes
    </label><br>
    <label for="ageNo">
      <input type="radio" id="ageNo" name="ageGroup" value="no"> No
    </label><br><br>

    <p>Do you have a credit card or PayPal?</p>
    <select name="payment">
      <option value="credit">Credit card</option>
      <option value="paypal">PayPal</option>
    </select><br><br>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
